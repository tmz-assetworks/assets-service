# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- none

pool:
  vmImage: ubuntu-latest # todo change to self-hosted agent

variables:
  projectName: "AssetsService.Api"

jobs: 
- job: PublishServiceArtifacts
  steps:

    # ensure the build agent is using .NET 6
    - task: UseDotNet@2
      displayName: 'Use .NET 6 SDK'
      inputs:
        packageType: sdk
        version: 6.x
        installationPath: $(Agent.ToolsDirectory)/dotnet
    
    # restore the api project
    - task: DotNetCoreCLI@2
      displayName: 'Restore Service'
      inputs:        
        command: 'restore'
        projects: '**/$(projectName).csproj'
        feedsToUse: 'select'
    
    # build the api project
    - task: DotNetCoreCLI@2
      displayName: 'Build Service'
      inputs:
        command: 'build'
        projects: '**/$(projectName).csproj'
    
    # publish the api project to the artifact directory
    - task: DotNetCoreCLI@2
      displayName: 'Publish Service'
      inputs:
        command: 'publish'
        nobuild: true
        publishWebProjects: false
        projects: '**/$(projectName).csproj'
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: false

    # move the files into a folder named publish 
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(Build.ArtifactStagingDirectory)/AssetsService'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/publish'
    
    # delete the original publish folder
    - task: DeleteFiles@1
      inputs:
        SourceFolder: '$(Build.ArtifactStagingDirectory)'
        Contents: 'AssetsService'

    # copy the docker file to the artifact directory
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)'
        Contents: '**/AssetsService/Dockerfile'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        flattenFolders: true
    
    # publish the artifacts
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'